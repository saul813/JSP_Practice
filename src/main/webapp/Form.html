<html>
<body>
<head>
    <title> Student Registration</title>
</head>
<form action ="form-response.jsp">
    First Name: <input type="text" name="firstName" />
    <br/><br/>
    Last Name: <input type="text" name="lastName" />
    <br/><br/>
    Favourite Programming Language: <br/>
    <input type="radio" name="favouriteLanguage" value="Java"> Java
    <input type="radio" name="favouriteLanguage" value="JS"> JS
    <input type="radio" name="favouriteLanguage" value="Python"> Python
    <input type="radio" name="favouriteLanguage" value="C"> C
    <input type="radio" name="favouriteLanguage" value="C#"> C#
    <br/><br/>
    Choose Favourite IDEs: <br/>
    <input type="checkbox" name="favourite_IDE" value="VS_Code"> VS_Code
    <input type="checkbox" name="favourite_IDE" value="Code_Blocks"> Code_Blocks
    <input type="checkbox" name="favourite_IDE" value="PyCharm"> PyCharm
    <input type="checkbox" name="favourite_IDE" value="InteliJ_IDEA"> InteliJ_IDEA
    <input type="checkbox" name="favourite_IDE" value="Remix_IDE"> Remix_IDE

    <br/><br/>
    <select name="country">
        <option>Uganda</option>
        <option>Kenya</option>
        <option>Tanzania</option>
        <option>Rwanda</option>
        <option>Burundi</option>
    </select>

    <br/><br/>
    <input type = "Submit" value="Submit" />

</form>
</body>
</html>
